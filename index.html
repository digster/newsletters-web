<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container container--wide header__inner">
      <div class="header__title">
        <a href="index.html">Newsletter Archive</a>
      </div>
      <div class="header__stats" id="stats"></div>
    </div>
  </header>

  <main class="container container--wide">
    <div class="search-wrap">
      <input
        type="text"
        class="search-input"
        id="search"
        placeholder="Search newsletters... (press / to focus)"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="grid" id="newsletter-grid">
      <div class="loading">Loading...</div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    App.initHomepage();
    App.initKeyboard();
  </script>
</body>
</html>
